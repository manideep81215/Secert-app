spring.application.name=app
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
server.port=${PORT:8080}
server.forward-headers-strategy=framework
server.tomcat.threads.max=${SERVER_TOMCAT_THREADS_MAX:32}
server.tomcat.threads.min-spare=${SERVER_TOMCAT_THREADS_MIN_SPARE:4}
server.tomcat.accept-count=${SERVER_TOMCAT_ACCEPT_COUNT:50}
server.tomcat.max-connections=${SERVER_TOMCAT_MAX_CONNECTIONS:200}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.main.lazy-initialization=true
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:1}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# Comma-separated CORS origins/patterns for HTTP + WebSocket endpoints.
app.cors.allowed-origin-patterns=*
app.websocket.message-size-limit-bytes=${APP_WEBSOCKET_MESSAGE_SIZE_LIMIT_BYTES:262144}
app.websocket.send-buffer-size-limit-bytes=${APP_WEBSOCKET_SEND_BUFFER_SIZE_LIMIT_BYTES:262144}
app.websocket.send-time-limit-ms=${APP_WEBSOCKET_SEND_TIME_LIMIT_MS:15000}

# Allow chat media upload sizes above Spring's default multipart limit.
# Keep this conservative for 512MB instances.
app.chat.media.max-bytes=${APP_CHAT_MEDIA_MAX_BYTES:12582912}
app.chat.media.max-download-bytes=${APP_CHAT_MEDIA_MAX_DOWNLOAD_BYTES:${APP_CHAT_MEDIA_MAX_BYTES:12582912}}
spring.servlet.multipart.max-file-size=${APP_CHAT_MEDIA_MAX_FILE_SIZE:12MB}
spring.servlet.multipart.max-request-size=${APP_CHAT_MEDIA_MAX_REQUEST_SIZE:12MB}
spring.servlet.multipart.file-size-threshold=${APP_CHAT_MEDIA_FILE_THRESHOLD:1MB}

# Media storage split:
# - voice uploads stay in DB
# - image/video/file uploads stay local first, then migrate to Drive after retention window
app.media.local-dir=${APP_MEDIA_LOCAL_DIR:/uploads/media/}
app.media.drive.enabled=${APP_MEDIA_DRIVE_ENABLED:true}
app.media.drive.folder-id=${APP_MEDIA_DRIVE_FOLDER_ID:1aRnrAtHrsiQxUoK4i5ysTQ6-MHJK-jYJ}
app.media.drive.public-read=${APP_MEDIA_DRIVE_PUBLIC_READ:true}
app.media.drive.credentials-file=${APP_MEDIA_DRIVE_CREDENTIALS_FILE:src/main/resources/simp-games-quest.json}
app.media.drive.credentials-json=${APP_MEDIA_DRIVE_CREDENTIALS_JSON:${APP_PUSH_FCM_CREDENTIALS_JSON:}}
app.media.drive.credentials-base64=${APP_MEDIA_DRIVE_CREDENTIALS_BASE64:${APP_PUSH_FCM_CREDENTIALS_BASE64:}}
app.media.migration.enabled=${APP_MEDIA_MIGRATION_ENABLED:true}
app.media.migration.age-days=${APP_MEDIA_MIGRATION_AGE_DAYS:3}
app.media.migration.cron=${APP_MEDIA_MIGRATION_CRON:0 0 * * * *}
spring.task.scheduling.pool.size=${SPRING_TASK_SCHEDULING_POOL_SIZE:5}

# Web Push (VAPID) configuration.
# Generate keys: npx web-push generate-vapid-keys
app.push.vapid.public-key=${APP_PUSH_VAPID_PUBLIC_KEY:${VAPID_PUBLIC_KEY:${APP_PUSH_PUBLIC_KEY:${PUSH_PUBLIC_KEY:}}}}
app.push.vapid.private-key=${APP_PUSH_VAPID_PRIVATE_KEY:${VAPID_PRIVATE_KEY:${APP_PUSH_PRIVATE_KEY:${PUSH_PRIVATE_KEY:}}}}
app.push.vapid.subject=${APP_PUSH_VAPID_SUBJECT:${VAPID_SUBJECT:${APP_PUSH_SUBJECT:mailto:admin@example.com}}}
# Send push regardless of online state (restored old behavior for locked-screen reliability).
app.push.notify-when-online=${APP_PUSH_NOTIFY_WHEN_ONLINE:true}

# Firebase Cloud Messaging (native mobile push when app is closed).
# Set ONE of:
# 1) APP_PUSH_FCM_CREDENTIALS_FILE: absolute path to service-account JSON
# 2) APP_PUSH_FCM_CREDENTIALS_JSON: raw JSON string
# 3) APP_PUSH_FCM_CREDENTIALS_BASE64: base64-encoded JSON
app.push.fcm.enabled=${APP_PUSH_FCM_ENABLED:true}
app.push.fcm.credentials-file=${APP_PUSH_FCM_CREDENTIALS_FILE:}
app.push.fcm.credentials-json=${APP_PUSH_FCM_CREDENTIALS_JSON:}
app.push.fcm.credentials-base64=${APP_PUSH_FCM_CREDENTIALS_BASE64:}

# Auth token configuration (JWT).
# Set both secrets in production to long random strings (>=32 chars each).
app.auth.jwt-access-secret=${APP_AUTH_JWT_ACCESS_SECRET:change-this-access-jwt-secret-in-production-change-this}
app.auth.jwt-refresh-secret=${APP_AUTH_JWT_REFRESH_SECRET:change-this-refresh-jwt-secret-in-production-change-this}
# Access token default: 15 minutes.
app.auth.jwt-access-expiration-ms=${APP_AUTH_JWT_ACCESS_EXPIRATION_MS:900000}
# Refresh token default: 30 days.
app.auth.jwt-refresh-expiration-ms=${APP_AUTH_JWT_REFRESH_EXPIRATION_MS:2592000000}

# Chat retention policy.
# Deletes old plain-text rows and old voice rows based on retention window.
app.chat.text-retention-days=${APP_CHAT_TEXT_RETENTION_DAYS:3}
# Hourly cleanup by default.
app.chat.cleanup.cron=${APP_CHAT_CLEANUP_CRON:0 0 * * * *}

# Presence policy:
# client sends /user.online heartbeat every ~30s; users are marked offline if no heartbeat.
app.chat.presence-timeout-ms=${APP_CHAT_PRESENCE_TIMEOUT_MS:65000}
app.chat.presence-prune-ms=${APP_CHAT_PRESENCE_PRUNE_MS:20000}
app.games.ttt.room-ttl-ms=${APP_GAMES_TTT_ROOM_TTL_MS:3600000}
app.games.ttt.room-prune-ms=${APP_GAMES_TTT_ROOM_PRUNE_MS:60000}
app.games.snl.room-ttl-ms=${APP_GAMES_SNL_ROOM_TTL_MS:3600000}
app.games.snl.room-prune-ms=${APP_GAMES_SNL_ROOM_PRUNE_MS:60000}
